services:
  tavolo-http-server:
    image: ${HTTP_SERVER_IMAGE:-skiko-util-http-server:latest}
    build:
      context: ..
      dockerfile: http-server/Dockerfile
    environment:
      TAVOLO_HTTP_HOST: "0.0.0.0"
      TAVOLO_HTTP_PORT: "8080"
      TAVOLO_ASSETS_DIR: "/app/assets"
    ports:
      - "${HTTP_SERVER_PORT:-8080}:8080"
    volumes:
      - "${ASSETS_DIR:-../assets}:/app/assets:ro"
    restart: unless-stopped
