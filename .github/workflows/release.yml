name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: 构建 Release 资源
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 安装图形测试运行依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fontconfig \
            fonts-dejavu-core \
            libegl1 \
            libfontconfig1 \
            libfreetype6 \
            libgl1 \
            libx11-6 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrender1 \
            libxtst6 \
            xvfb

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 授权 Gradle Wrapper
        run: chmod +x ./gradlew

      - name: 确定 Release 版本
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_version="${GITHUB_REF_NAME}"
          else
            echo "当前 workflow 需要不带 v 前缀的版本 tag" >&2
            exit 1
          fi
          if [[ "${release_version}" == v* ]]; then
            echo "Release tag 不能使用 v 前缀: ${release_version}" >&2
            exit 1
          fi
          if [[ ! "${release_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT)?$ ]]; then
            echo "Release 版本必须符合 x.y.z 或 x.y.z-SNAPSHOT 格式: ${release_version}" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"
          if [[ "${release_version}" == *-SNAPSHOT ]]; then
            echo "IS_SNAPSHOT=true" >> "$GITHUB_ENV"
          else
            echo "IS_SNAPSHOT=false" >> "$GITHUB_ENV"
          fi

      - name: 运行发布前检查
        run: xvfb-run -a ./gradlew check --parallel --build-cache --stacktrace --console=plain

      - name: 校验发布凭证和元数据
        shell: bash
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          set -euo pipefail
          for name in CENTRAL_USERNAME CENTRAL_PASSWORD SIGNING_KEY SIGNING_PASSWORD NEXUS_USERNAME NEXUS_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "缺少发布必需 secret: ${name}" >&2
              exit 1
            fi
          done
          ./gradlew checkPomFileForMavenPublication --parallel --build-cache --stacktrace --console=plain

      - name: 构建 server jar 和外置指令资源包
        run: ./gradlew :http-server:packageServerJar :core:packageCommandAssets --parallel --build-cache --stacktrace --console=plain

      - name: 发布 Nexus Maven 包
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: ./gradlew publishAllPublicationsToNexusRepository --parallel --build-cache --stacktrace --console=plain

      - name: 发布并放行 Maven Central 正式版
        if: env.IS_SNAPSHOT == 'false'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --parallel --build-cache --stacktrace --console=plain

      - name: 跳过 Maven Central snapshot
        if: env.IS_SNAPSHOT == 'true'
        run: echo "Snapshot version only publishes to Nexus"

      - name: 收集 Release 资源文件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release-assets
          cp "core/build/distributions/tavolo-assets-${RELEASE_VERSION}.zip" build/release-assets/
          cp "http-server/build/distributions/tavolo-server-${RELEASE_VERSION}.jar" build/release-assets/
          ls -lh build/release-assets

      - name: 上传 CI 资源文件
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: build/release-assets/*
          if-no-files-found: error

      - name: 上传 GitHub Release 资源文件
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/release-assets/*
          fail_on_unmatched_files: true
