name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: 构建 Release 资源
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 授权 Gradle Wrapper
        run: chmod +x ./gradlew

      - name: 构建 jar 和外置指令资源包
        run: ./gradlew clean assemble :core:packageCommandAssets --stacktrace --console=plain

      - name: 收集 Release 资源文件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release-assets
          cp core/build/distributions/tavolo-assets-*.zip build/release-assets/
          find annotation bdf-parser common core gif-codec graphics http-client http-server ksp \
            -path "*/build/libs/*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -exec cp {} build/release-assets/ \;
          ls -lh build/release-assets

      - name: 上传 CI 资源文件
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: build/release-assets/*
          if-no-files-found: error

      - name: 上传 GitHub Release 资源文件
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/release-assets/*
          fail_on_unmatched_files: true
