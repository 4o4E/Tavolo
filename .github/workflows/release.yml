name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "手动发布版本，格式示例: 2.0.1"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: 构建 Release 资源
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 授权 Gradle Wrapper
        run: chmod +x ./gradlew

      - name: 确定 Release 版本
        shell: bash
        run: |
          set -euo pipefail
          manual_version="${{ github.event.inputs.release_version || '' }}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_version="${GITHUB_REF_NAME}"
          elif [ -n "${manual_version}" ]; then
            release_version="${manual_version}"
          else
            echo "当前 workflow 需要版本 tag，或手动输入 release_version" >&2
            exit 1
          fi
          if [[ ! "${release_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release 版本必须符合 x.y.z 格式: ${release_version}" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=${release_version}" >> "$GITHUB_ENV"

      - name: 构建 server jar 和外置指令资源包
        run: ./gradlew :http-server:packageServerJar :core:packageCommandAssets -PreleaseVersion="${RELEASE_VERSION}" --parallel --build-cache --stacktrace --console=plain

      - name: 发布 GitHub Packages Maven 包
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository -PreleaseVersion="${RELEASE_VERSION}" --parallel --build-cache --stacktrace --console=plain

      - name: 收集 Release 资源文件
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release-assets
          cp "core/build/distributions/tavolo-assets-${RELEASE_VERSION}.zip" build/release-assets/
          cp "http-server/build/distributions/tavolo-server-${RELEASE_VERSION}.jar" build/release-assets/
          ls -lh build/release-assets

      - name: 上传 CI 资源文件
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: build/release-assets/*
          if-no-files-found: error

      - name: 上传 GitHub Release 资源文件
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/release-assets/*
          fail_on_unmatched_files: true
