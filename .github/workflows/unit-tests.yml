name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Gradle unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 安装图形测试运行依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fontconfig \
            fonts-dejavu-core \
            libegl1 \
            libfontconfig1 \
            libfreetype6 \
            libgl1 \
            libx11-6 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrender1 \
            libxtst6 \
            xvfb

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 授权 Gradle Wrapper
        run: chmod +x ./gradlew

      - name: 运行单元测试
        shell: bash
        run: |
          mkdir -p build
          set -o pipefail
          xvfb-run -a ./gradlew :core:clean test --stacktrace --console=plain 2>&1 | tee build/ci-gradle-test.log

      - name: 上传失败测试报告
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/ci-gradle-test.log
            **/build/reports/tests/test/
            **/build/test-results/test/
