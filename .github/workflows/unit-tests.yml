name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Gradle unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 授权 Gradle Wrapper
        run: chmod +x ./gradlew

      - name: 运行单元测试
        run: ./gradlew :core:clean test --stacktrace

      - name: 上传失败测试报告
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/test/
            **/build/test-results/test/
