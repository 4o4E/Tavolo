name: Unit Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Gradle unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: 安装图形测试运行依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fontconfig \
            fonts-dejavu-core \
            libegl1 \
            libfontconfig1 \
            libfreetype6 \
            libgl1 \
            libx11-6 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrender1 \
            libxtst6 \
            xvfb

      - name: 设置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 授权 Gradle Wrapper
        run: chmod +x ./gradlew

      - name: 运行单元测试
        id: unit-tests
        shell: bash
        run: |
          mkdir -p build
          set -o pipefail
          xvfb-run -a ./gradlew test --parallel --build-cache --stacktrace --console=plain 2>&1 | tee build/ci-gradle-test.log

      - name: 输出失败日志摘要
        if: failure() && steps.unit-tests.outcome == 'failure'
        shell: bash
        run: |
          if [ -f build/ci-gradle-test.log ]; then
            {
              echo "### Gradle 失败日志"
              echo '```text'
              tail -n 160 build/ci-gradle-test.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            message="$(grep -E "^(> Task|FAILURE:|\\* What went wrong:|Execution failed|Caused by:|Cannot run program|A problem occurred starting process)" build/ci-gradle-test.log | tail -n 20)"
            if [ -z "$message" ]; then
              message="$(tail -n 40 build/ci-gradle-test.log)"
            fi
            message="${message//'%'/'%25'}"
            message="${message//$'\n'/'%0A'}"
            message="${message//$'\r'/'%0D'}"
            echo "::error title=Gradle 失败摘要::$message"
          fi

      - name: 上传失败测试报告
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/ci-gradle-test.log
            **/build/reports/tests/test/
            **/build/test-results/test/
